<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDARA AI — Design Documentation</title>
  <meta name="description" content="AI-Powered Antimicrobial Resistance Surveillance for Sub-Saharan Africa">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #06b6d4;
      --cover-background-color: #09090b;
      --sidebar-width: 280px;
      --sidebar-background: #09090b;
      --sidebar-nav-link-color: #71717a;
      --sidebar-nav-link-font-size: 13.5px;
      --sidebar-nav-link-padding: 6px 20px 6px 24px;
      --sidebar-nav-section-font-size: 10.5px;
      --sidebar-nav-section-font-weight: 600;
      --sidebar-nav-section-text-transform: uppercase;
      --sidebar-nav-section-letter-spacing: 0.1em;
      --sidebar-nav-section-color: #52525b;
      --sidebar-nav-section-padding: 18px 24px 6px;
      --sidebar-name-font-size: 15px;
      --sidebar-name-font-weight: 700;
      --sidebar-name-color: #fafafa;
      --sidebar-name-padding: 20px 20px 16px;
      --sidebar-name-border: 1px solid rgba(255,255,255,0.06);
      --sidebar-divider: 1px solid rgba(255,255,255,0.06);
      --sidebar-divider-margin: 6px 24px;
      --sidebar-nav-link-hover-color: #fafafa;
      --sidebar-nav-link-active-color: #22d3ee;
      --sidebar-nav-link-active-background: rgba(6,182,212,0.1);
      --sidebar-nav-link-active-font-weight: 500;
      --sidebar-nav-link-active-border-color: #06b6d4;
      --sidebar-nav-link-border: 2px solid transparent;
      --content-max-width: 820px;
      --content-padding: 48px 56px 120px;
      --heading-color: #fafafa;
      --heading-font-weight: 700;
      --heading-letter-spacing: -0.03em;
      --heading-border-bottom: 1px solid rgba(255,255,255,0.06);
      --heading-margin-top: 48px;
      --link-color: #06b6d4;
      --link-decoration: none;
      --blockquote-color: #a1a1aa;
      --blockquote-border-color: #06b6d4;
      --blockquote-background: rgba(6,182,212,0.06);
      --code-font-family: 'JetBrains Mono', monospace;
      --code-font-size: 0.84em;
      --code-background: #18181b;
      --code-color: #22d3ee;
      --code-border: 1px solid rgba(255,255,255,0.06);
      --code-block-color: #a1a1aa;
      --code-block-background: #1c1c21;
      --code-block-border: 1px solid rgba(255,255,255,0.06);
      --code-block-border-radius: 10px;
      --table-head-background: #18181b;
      --table-head-color: #fafafa;
      --table-head-font-size: 11.5px;
      --table-head-font-weight: 600;
      --table-head-text-transform: uppercase;
      --table-head-letter-spacing: 0.06em;
      --table-border: 1px solid rgba(255,255,255,0.06);
      --table-border-radius: 10px;
      --pagination-color: #71717a;
      --pagination-title-color: #fafafa;
      --pagination-border: 1px solid rgba(255,255,255,0.06);
      --pagination-hover-color: #06b6d4;
      --pagination-hover-background: rgba(6,182,212,0.1);
      --pagination-border-radius: 6px;
      --pagination-padding: 10px 16px;
      --pagination-font-size: 13px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: #09090b;
      color: #a1a1aa;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(6,182,212,0.3); color: #fff; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    /* Sidebar */
    .sidebar {
      background: #09090b;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-nav li a {
      border-left: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .sidebar-nav li a:hover {
      background: rgba(255,255,255,0.03);
      border-left-color: rgba(6,182,212,0.4);
    }

    .sidebar-nav li.active > a {
      background: rgba(6,182,212,0.08);
      border-left-color: #06b6d4;
    }

    /* Headings */
    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 12px;
    }

    .markdown-section h2 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-top: 48px;
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 36px;
    }

    .markdown-section h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 28px;
    }

    /* Text */
    .markdown-section p { line-height: 1.8; }
    .markdown-section strong { color: #fafafa; font-weight: 600; }

    /* Blockquote */
    .markdown-section blockquote {
      border-left: 3px solid #06b6d4;
      background: rgba(6,182,212,0.06);
      border-radius: 0 6px 6px 0;
      padding: 14px 18px;
    }

    .markdown-section blockquote p { margin: 0; font-size: 14px; }

    /* Lists */
    .markdown-section li::marker { color: #06b6d4; }

    /* Code */
    .markdown-section code {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 2px 7px;
      color: #22d3ee;
      font-weight: 500;
    }

    .markdown-section pre {
      background: #1c1c21;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      position: relative;
    }

    .markdown-section pre code {
      background: none;
      border: none;
      padding: 18px 22px;
      color: #a1a1aa;
      font-size: 12.5px;
      line-height: 1.7;
      font-weight: 400;
    }

    .markdown-section pre[data-lang]::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px; right: 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #52525b;
      background: #18181b;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    /* Tables */
    .markdown-section table {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
    }

    .markdown-section thead th {
      background: #18181b;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 10px 14px;
    }

    .markdown-section tbody td {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 10px 14px;
    }

    .markdown-section tbody tr:hover { background: rgba(255,255,255,0.02); }

    /* Pagination */
    .docsify-pagination-container {
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 56px;
    }

    .pagination-item {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 10px 16px;
      flex: 1;
      transition: all 0.2s;
    }

    .pagination-item:hover {
      border-color: #06b6d4;
      background: rgba(6,182,212,0.08);
    }

    .pagination-item-label { font-size: 10px; letter-spacing: 0.08em; }
    .pagination-item-title { font-size: 13.5px; font-weight: 500; color: #fafafa; }

    /* Search */
    .search input {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      color: #fafafa;
    }

    .search input:focus {
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
    }

    .search .matching-post:hover { background: rgba(6,182,212,0.08); }
    .search .matching-post a { color: #fafafa; font-weight: 500; }

    /* Cover */
    .cover-main {
      background: #09090b;
      text-align: center;
    }

    .cover-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(6,182,212,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(16,185,129,0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    .cover-main h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #fafafa;
      margin-bottom: 12px;
    }

    .cover-main h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #06b6d4, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cover-main blockquote {
      font-size: 1.1rem;
      color: #71717a;
      max-width: 540px;
      margin: 0 auto 40px;
      border: none;
      background: none;
      padding: 0;
      line-height: 1.6;
    }

    .cover-main ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .cover-main ul li {
      padding: 8px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      font-size: 13px;
      color: #a1a1aa;
    }

    .cover-main a {
      padding: 10px 24px;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      transition: all 0.25s;
      margin: 6px;
    }

    .cover-main a:not([href="#"]) {
      background: #06b6d4;
      color: #09090b;
    }

    .cover-main a:not([href="#"]):hover {
      background: #22d3ee;
      box-shadow: 0 0 30px rgba(6,182,212,0.3);
      color: #09090b;
      text-shadow: none;
    }

    .cover-main a[href="#"] {
      border: 1px solid rgba(255,255,255,0.1);
      color: #a1a1aa;
    }

    .cover-main a[href="#"]:hover {
      border-color: #06b6d4;
      color: #fafafa;
      text-shadow: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .markdown-section { padding: 24px 16px 80px; }
      .cover-main h1 { font-size: 2.5rem; }
      .cover-main ul { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">🧬</span><span>UDARA AI</span></div>',
      nameLink: '/stia_docs_/',
      loadSidebar: true,
      coverpage: true,
      onlyCover: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },
      topMargin: 56,
      loadNavbar: false,
      afterEach: function(hook) {
        hook.afterEach(function(html) {
          setTimeout(function() {
            document.querySelectorAll('.docsify-pagination-container a').forEach(function(a) {
              var href = a.getAttribute('href');
              if (href && !href.startsWith('http') && !href.startsWith('/stia_docs_/')) {
                a.setAttribute('href', '/stia_docs_/' + href.replace(/^\//, ''));
              }
            });
          }, 100);
          return html;
        });
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-hcl.min.js"></script>
</body>
</html>
