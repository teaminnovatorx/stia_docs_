<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDARA AI — Design Documentation</title>
  <meta name="description" content="AI-Powered Antimicrobial Resistance Surveillance for Sub-Saharan Africa">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      /* Base */
      --base-font-size: 15px;
      --base-line-height: 1.75;
      --base-font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --base-background-color: #0a0a0f;
      --base-color: #c4c4cc;
      --theme-color: #38bdf8;

      /* Sidebar */
      --sidebar-width: 280px;
      --sidebar-background: #0a0a0f;
      --sidebar-border-color: rgba(255,255,255,0.06);
      --sidebar-font-family: 'DM Sans', sans-serif;
      --sidebar-nav-link-color: #8b8b94;
      --sidebar-nav-link-font-size: 13.5px;
      --sidebar-nav-link-padding: 7px 16px 7px 24px;
      --sidebar-nav-link-border: 2px solid transparent;
      --sidebar-nav-link-hover-color: #eeeef0;
      --sidebar-nav-link-hover-background: rgba(56,189,248,0.06);
      --sidebar-nav-link-hover-border-color: rgba(56,189,248,0.3);
      --sidebar-nav-link-active-color: #38bdf8;
      --sidebar-nav-link-active-background: rgba(56,189,248,0.1);
      --sidebar-nav-link-active-border-color: #38bdf8;
      --sidebar-nav-link-active-font-weight: 600;
      --sidebar-nav-section-font-size: 10px;
      --sidebar-nav-section-font-weight: 700;
      --sidebar-nav-section-color: #52525b;
      --sidebar-nav-section-text-transform: uppercase;
      --sidebar-nav-section-letter-spacing: 0.12em;
      --sidebar-nav-section-padding: 16px 20px 5px;
      --sidebar-name-color: #eeeef0;
      --sidebar-name-font-size: 16px;
      --sidebar-name-font-weight: 800;
      --sidebar-name-padding: 20px 20px 16px;
      --sidebar-name-border-bottom: 1px solid rgba(255,255,255,0.06);
      --sidebar-divider-color: rgba(255,255,255,0.06);
      --sidebar-divider-margin: 4px 20px;

      /* Content */
      --content-max-width: 820px;
      --content-padding: 44px 56px 120px;

      /* Headings */
      --heading-color: #eeeef0;
      --heading-font-family: 'DM Sans', sans-serif;
      --heading-font-weight: 700;
      --heading-letter-spacing: -0.03em;
      --heading-line-height: 1.3;
      --heading-margin-top: 48px;
      --heading-border-bottom: 1px solid rgba(255,255,255,0.06);
      --h1-font-size: 2rem;
      --h2-font-size: 1.4rem;
      --h3-font-size: 1.1rem;

      /* Links */
      --link-color: #38bdf8;
      --link-text-decoration: none;
      --link-text-decoration-hover: underline;

      /* Blockquote */
      --blockquote-color: #a1a1aa;
      --blockquote-border-color: #38bdf8;
      --blockquote-background: rgba(56,189,248,0.06);
      --blockquote-border-radius: 0 8px 8px 0;
      --blockquote-padding: 14px 18px;

      /* Code */
      --code-font-family: 'Fira Code', monospace;
      --code-font-size: 0.85em;
      --code-inline-background: #16161e;
      --code-inline-color: #38bdf8;
      --code-inline-border: 1px solid rgba(255,255,255,0.06);
      --code-inline-border-radius: 5px;
      --code-block-color: #b4b4bc;
      --code-block-background: #111118;
      --code-block-border: 1px solid rgba(255,255,255,0.06);
      --code-block-border-radius: 10px;
      --code-block-line-height: 1.7;

      /* Table */
      --table-head-background: #16161e;
      --table-head-color: #eeeef0;
      --table-head-font-size: 11px;
      --table-head-font-weight: 700;
      --table-head-text-transform: uppercase;
      --table-head-letter-spacing: 0.07em;
      --table-border-color: rgba(255,255,255,0.06);
      --table-border-radius: 10px;
      --table-stripe-background: rgba(255,255,255,0.015);

      /* Pagination */
      --pagination-item-padding: 10px 16px;
      --pagination-item-border: 1px solid rgba(255,255,255,0.06);
      --pagination-item-border-radius: 8px;
      --pagination-item-color: #71717a;
      --pagination-item-hover-border-color: #38bdf8;
      --pagination-item-hover-background: rgba(56,189,248,0.06);
      --pagination-title-color: #eeeef0;
      --pagination-title-font-size: 13.5px;
      --pagination-label-font-size: 10px;
      --pagination-label-font-weight: 600;
      --pagination-label-letter-spacing: 0.08em;
      --pagination-label-color: #52525b;
      --pagination-margin-top: 56px;
      --pagination-padding-top: 20px;
      --pagination-border-top: 1px solid rgba(255,255,255,0.06);

      /* Search */
      --search-background: #16161e;
      --search-border-color: rgba(255,255,255,0.06);
      --search-color: #eeeef0;
      --search-focus-border-color: #38bdf8;
      --search-result-hover-background: rgba(56,189,248,0.06);
      --search-result-title-color: #eeeef0;
      --search-result-keyword-color: #38bdf8;

      /* Cover */
      --cover-background-color: #0a0a0f;
      --cover-heading-color: #eeeef0;
      --cover-heading-font-size: 3.5rem;
      --cover-heading-font-weight: 800;
      --cover-heading-letter-spacing: -0.05em;
      --cover-blockquote-color: #71717a;
      --cover-link-color: #38bdf8;
      --cover-link-background: #38bdf8;
      --cover-link-color-hover: #0a0a0f;
      --cover-button-primary-background: #38bdf8;
      --cover-button-primary-color: #0a0a0f;
      --cover-button-primary-color-hover: #0a0a0f;
      --cover-button-primary-background-hover: #7dd3fc;
      --cover-button-secondary-color: #a1a1aa;
      --cover-button-secondary-border: 1px solid rgba(255,255,255,0.12);
      --cover-button-secondary-border-hover: #38bdf8;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    ::selection { background: rgba(56,189,248,0.3); color: #fff; }

    /* Sidebar polish */
    .sidebar { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .sidebar-nav li a { transition: all 0.15s ease; border-left: 2px solid transparent; }
    .sidebar-nav li a:hover { text-shadow: none; }

    /* Cover polish */
    .cover-main { position: relative; overflow: hidden; }
    .cover-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(56,189,248,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 85%, rgba(139,92,246,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .cover-main > * { position: relative; z-index: 1; }

    .cover-main ul li {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
    }

    .cover-main ul li:hover {
      border-color: rgba(56,189,248,0.3);
      background: rgba(56,189,248,0.06);
    }

    /* Markdown content polish */
    .markdown-section p { line-height: 1.8; }
    .markdown-section strong { color: #eeeef0; font-weight: 600; }
    .markdown-section li { line-height: 1.7; }
    .markdown-section li::marker { color: #38bdf8; }
    .markdown-section hr { border-top-color: rgba(255,255,255,0.06); margin: 36px 0; }
    .markdown-section table { overflow: hidden; }
    .markdown-section tbody tr:hover { background: rgba(56,189,248,0.04); }
    .markdown-section img { border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }

    /* Pre code language label */
    .markdown-section pre[data-lang]::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px; right: 12px;
      font-size: 10px;
      font-family: 'Fira Code', monospace;
      color: #52525b;
      background: #16161e;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .markdown-section { padding: 24px 16px 80px; }
      .cover-main h1 { font-size: 2.2rem !important; }
      .cover-main ul { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '🧬 UDARA AI',
      nameLink: '/',
      loadSidebar: true,
      coverpage: true,
      onlyCover: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },
      topMargin: 56,
      loadNavbar: false,
      afterEach: function(hook) {
        hook.afterEach(function(html) {
          setTimeout(function() {
            document.querySelectorAll('.docsify-pagination-container a').forEach(function(a) {
              var href = a.getAttribute('href');
              if (href && !href.startsWith('http') && !href.startsWith('/stia_docs_/')) {
                a.setAttribute('href', '/stia_docs_/' + href.replace(/^\//, ''));
              }
            });
          }, 200);
          return html;
        });
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-hcl.min.js"></script>
</body>
</html>
