<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDARA AI — Design Documentation</title>
  <meta name="description" content="AI-Powered Antimicrobial Resistance Surveillance for Sub-Saharan Africa">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ========== ROOT ========== */
    :root {
      --bg: #09090b;
      --bg-card: #111113;
      --bg-elevated: #18181b;
      --bg-code: #1c1c21;
      --text: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --accent: #06b6d4;
      --accent-2: #22d3ee;
      --green: #10b981;
      --emerald: #34d399;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --violet: #8b5cf6;
      --border: rgba(255,255,255,0.06);
      --border-2: rgba(255,255,255,0.1);
      --glow: rgba(6,182,212,0.15);
      --sidebar-w: 280px;
      --header-h: 56px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --r: 10px;
      --r-sm: 6px;
    }

    /* ========== RESET ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-2);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    ::selection { background: rgba(6,182,212,0.3); color: #fff; }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-2); }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    /* ========== SIDEBAR ========== */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      z-index: 100;
      padding: 0;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    .sidebar-nav { padding: 0; }

    .sidebar-nav ul { list-style: none; padding: 0; margin: 0; }

    .sidebar-nav li a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px 7px 22px;
      color: var(--text-3);
      font-size: 13.5px;
      font-weight: 400;
      border-left: 2px solid transparent;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }

    .sidebar-nav li a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
      border-left-color: rgba(6,182,212,0.4);
    }

    .sidebar-nav li.active > a {
      color: var(--accent-2);
      background: var(--glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    /* Sidebar brand */
    .sidebar-brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .sidebar-brand a { display: flex; align-items: center; gap: 10px; }
    .sidebar-brand a:hover { text-shadow: none; }

    .sidebar-brand .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .sidebar-brand .brand-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .sidebar-brand .brand-text span {
      font-size: 10.5px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    /* Sidebar section headers */
    .sidebar-nav > ul > li > strong,
    .sidebar-nav > ul > li > a:not([href]) {
      display: block;
      padding: 18px 22px 6px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sidebar-nav > ul > li > strong { color: var(--text-3); }

    .sidebar-section-label {
      display: block;
      padding: 18px 22px 6px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 22px;
    }

    /* ========== MAIN CONTENT ========== */
    .content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    .markdown-section {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 56px 140px;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      position: fixed;
      top: 0; left: var(--sidebar-w); right: 0;
      height: var(--header-h);
      background: rgba(9,9,11,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 90;
      display: flex;
      align-items: center;
      padding: 0 32px;
    }

    .top-bar .search-input {
      width: 100%;
      max-width: 480px;
      padding: 8px 14px 8px 36px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .top-bar .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .top-bar .search-input::placeholder { color: var(--text-3); }

    .top-bar .search-icon {
      position: absolute;
      left: 44px;
      color: var(--text-3);
      font-size: 14px;
      pointer-events: none;
    }

    .top-bar .doc-title {
      position: absolute;
      right: 32px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* ========== TYPOGRAPHY ========== */
    .markdown-section > h1:first-child {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-top: 56px;
      margin-bottom: 12px;
      line-height: 1.2;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .markdown-section h2 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-top: 48px;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 36px;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .markdown-section h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-3);
      margin-top: 28px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .markdown-section p {
      margin-bottom: 14px;
      color: var(--text-2);
      line-height: 1.8;
    }

    .markdown-section strong { color: var(--text); font-weight: 600; }

    .markdown-section hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    /* ========== BLOCKQUOTE ========== */
    .markdown-section blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(6,182,212,0.06);
      padding: 14px 18px;
      margin: 20px 0;
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      color: var(--text-2);
    }

    .markdown-section blockquote p { margin: 0; font-size: 14px; }

    /* ========== LISTS ========== */
    .markdown-section ul, .markdown-section ol {
      padding-left: 22px;
      margin-bottom: 14px;
    }

    .markdown-section li {
      margin-bottom: 5px;
      color: var(--text-2);
      line-height: 1.7;
    }

    .markdown-section li::marker { color: var(--accent); }

    /* ========== CODE ========== */
    .markdown-section code {
      font-family: var(--mono);
      background: var(--bg-elevated);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.84em;
      color: var(--accent-2);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .markdown-section pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin: 20px 0;
      overflow: hidden;
      position: relative;
    }

    .markdown-section pre code {
      display: block;
      padding: 18px 22px;
      overflow-x: auto;
      background: none;
      border: none;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text-2);
      font-weight: 400;
    }

    /* Code language label */
    .markdown-section pre[data-lang]::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px; right: 12px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-3);
      background: var(--bg-elevated);
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    /* Prism token colors */
    .token.comment, .token.prolog { color: #52525b; font-style: italic; }
    .token.keyword { color: var(--violet); }
    .token.string, .token.attr-value { color: var(--green); }
    .token.number { color: var(--amber); }
    .token.function { color: var(--accent-2); }
    .token.class-name { color: #f0abfc; }
    .token.operator { color: var(--rose); }
    .token.punctuation { color: #52525b; }
    .token.decorator, .token.annotation { color: var(--amber); }
    .token.builtin { color: #67e8f9; }

    /* ========== TABLES ========== */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 13.5px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .markdown-section thead th {
      background: var(--bg-elevated);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border-2);
    }

    .markdown-section tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-2);
    }

    .markdown-section tbody tr:last-child td { border-bottom: none; }

    .markdown-section tbody tr:hover { background: rgba(255,255,255,0.02); }

    /* ========== IMAGES ========== */
    .markdown-section img {
      max-width: 100%;
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin: 16px 0;
    }

    /* ========== CHECKBOXES ========== */
    .markdown-section input[type="checkbox"] {
      appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--border-2);
      border-radius: 4px;
      background: var(--bg-elevated);
      vertical-align: middle;
      margin-right: 8px;
      position: relative;
      cursor: pointer;
      transition: all 0.15s;
    }

    .markdown-section input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .markdown-section input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -1px; left: 2px;
      font-size: 11px;
      color: var(--bg);
      font-weight: 700;
    }

    /* ========== PAGINATION ========== */
    .docsify-pagination-container {
      display: flex;
      gap: 12px;
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .pagination-item-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 3px;
      font-weight: 600;
    }

    .pagination-item-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
    }

    .pagination-item {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      transition: all 0.2s ease;
      flex: 1;
    }

    .pagination-item:hover {
      border-color: var(--accent);
      background: var(--glow);
      text-shadow: none;
    }

    .pagination-item-label, .pagination-item-title { transition: color 0.2s; }
    .pagination-item:hover .pagination-item-title { color: var(--accent-2); }

    /* ========== SEARCH ========== */
    .search {
      position: fixed;
      top: 0; left: var(--sidebar-w); right: 0;
      z-index: 200;
      height: var(--header-h);
      display: none;
    }

    .search input {
      width: 100%;
      height: 100%;
      padding: 0 24px;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
    }

    .search .matching-post {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .search .matching-post:hover { background: var(--glow); }
    .search .matching-post a { color: var(--text); font-weight: 500; font-size: 14px; }

    /* ========== MOBILE TOGGLE ========== */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 12px; left: 12px;
      z-index: 300;
      width: 38px; height: 38px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .sidebar-toggle:hover { border-color: var(--accent); background: var(--glow); }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: 280px; }
      .sidebar.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
      .content { margin-left: 0; }
      .markdown-section { padding: 32px 20px 80px; }
      .sidebar-toggle { display: flex; }
      .top-bar { left: 0; padding-left: 60px; }
    }

    /* ========== COVER PAGE ========== */
    .cover-main {
      text-align: center;
      padding: 80px 24px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .cover-main::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(6,182,212,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(16,185,129,0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    .cover-main h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--text);
      margin-bottom: 12px;
      position: relative;
      line-height: 1.1;
    }

    .cover-main h1 em {
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: normal;
    }

    .cover-main blockquote {
      font-size: 1.1rem;
      color: var(--text-3);
      max-width: 540px;
      margin: 0 auto 40px;
      border: none;
      background: none;
      padding: 0;
      line-height: 1.6;
    }

    .cover-main ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
      position: relative;
    }

    .cover-main ul li {
      padding: 8px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-2);
      transition: all 0.2s;
    }

    .cover-main ul li:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .cover-main a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 14px;
      border-radius: var(--r-sm);
      transition: all 0.25s ease;
      margin: 6px;
    }

    .cover-main a:not([href="#"]) {
      background: var(--accent);
      color: var(--bg);
    }

    .cover-main a:not([href="#"]):hover {
      background: var(--accent-2);
      box-shadow: 0 0 30px rgba(6,182,212,0.3);
      text-shadow: none;
      color: var(--bg);
    }

    .cover-main a[href="#"] {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-2);
    }

    .cover-main a[href="#"]:hover {
      border-color: var(--accent);
      color: var(--text);
      text-shadow: none;
    }

    /* ========== LOADING ========== */
    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-3);
      font-size: 14px;
    }

    /* ========== EMOJI IN HEADINGS ========== */
    .markdown-section h1 .emoji,
    .markdown-section h2 .emoji,
    .markdown-section h3 .emoji {
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'UDARA AI',
      nameLink: '/',
      loadSidebar: true,
      coverpage: true,
      onlyCover: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      search: {
        placeholder: 'Search documentation...',
        noData: 'No results found',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },
      topMargin: 56,
      loadNavbar: false
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-hcl.min.js"></script>
</body>
</html>
